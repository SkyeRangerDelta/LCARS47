name: Release & Deploy

on:
  push:
    branches:
      - master
      - Experimental

permissions:
  contents: write

concurrency:
  group: 'release-${{ github.ref_name }}'
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-devbuild-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-devbuild-${{ env.cache-name }}-

      - name: Install Dependencies
        run: npm i

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release


  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [release]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repository name
        id: repo
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Extract repository owner
        id: owner
        run: echo "OWNER=$(echo ${GITHUB_REPOSITORY%%/*} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF##*/}" == "master" ]]; then
            echo "TAG=latest" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF##*/}" == "Experimental" ]]; then
            echo "TAG=experimental" >> $GITHUB_ENV
          else
            echo "TAG=${GITHUB_REF##*/}" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.source=https://github.com/${{ env.REPO }}" \
            --label "org.opencontainers.image.authors=${{ github.actor }}" \
            --label "org.opencontainers.image.title=${{ env.REPO }}" \
            -t ghcr.io/${{ env.OWNER }}/lcars47:${{ github.sha }} \
            -t ghcr.io/${{ env.OWNER }}/lcars47:${{ env.TAG }} .

      - name: Push Docker image ( sha )
        run: |
          docker push ghcr.io/${{ env.OWNER }}/lcars47:${{ github.sha }} 

      - name: Push Docker image ( tag )
        run: |
          docker push ghcr.io/${{ env.OWNER }}/lcars47:${{ env.TAG }}

  sync-branches:
    name: Sync Branches
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref_name == 'master' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout Experimental
        uses: actions/checkout@v4
        with:
          ref: Experimental

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest master
        run: git fetch origin master

      - name: Merge master into Experimental
        run: |
          git merge --no-ff -m "chore: sync master into Experimental [skip ci]" origin/master

      - name: Push changes
        run: git push origin HEAD:Experimental