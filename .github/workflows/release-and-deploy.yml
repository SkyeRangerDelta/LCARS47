name: Release & Deploy

on:
  push:
    branches:
      - master
      - Experimental

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'Experimental'

permissions:
  contents: write

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "SkyeRangerDelta/lcars47"

concurrency:
  group: 'release-${{ github.ref_name }}'
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node.js Setup
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-devbuild-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-devbuild-${{ env.cache-name }}-

      - name: Install Dependencies
        run: npm i

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release


  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [release]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v2.2.2'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name == 'master' && 'latest' || 'experimental' }}
            type=raw,value=${{ github.sha }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}


  sync-branches:
    name: Sync Branches
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref_name == 'master' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout Experimental
        uses: actions/checkout@v6
        with:
          ref: Experimental

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest master
        run: git fetch origin master

      - name: Merge master into Experimental
        run: |
          git merge --no-ff -m "chore: sync master into Experimental [skip ci]" origin/master

      - name: Push changes
        run: git push origin HEAD:Experimental
