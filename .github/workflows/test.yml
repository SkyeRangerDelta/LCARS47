# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Test Node

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  ENV_DATA: ${{ secrets.ENV }}

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Generate ENV
      run: |
        pwd
        touch .env
        echo $ENV_DATA | base64 --decode > .env

    - name: Cache
      uses: actions/cache@v5
      with:
        path: node_modules
        key: ${{ runner.os }}-devbuild-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: ${{ runner.os }}-devbuild-${{ env.cache-name }}-

    - run: npm i

    - run: npm run test --if-present

    - name: Type Coverage Check
      id: type-coverage
      run: |
        set +e
        OUTPUT=$(npx type-coverage 2>&1)
        EXIT_CODE=$?
        set -e

        echo "$OUTPUT"

        COVERAGE=$(echo "$OUTPUT" | grep -oE '^[0-9]+\.?[0-9]*%' | head -1)
        COVERAGE_NUM=$(echo "$COVERAGE" | tr -d '%')

        if [ -z "$COVERAGE_NUM" ]; then
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "coverage=unknown" >> $GITHUB_OUTPUT
        elif [ "$(echo "$COVERAGE_NUM < 90" | bc -l)" -eq 1 ]; then
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
        else
          echo "status=success" >> $GITHUB_OUTPUT
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
        fi

        EOF_MARKER=$(openssl rand -hex 8)
        echo "details<<$EOF_MARKER" >> $GITHUB_OUTPUT
        echo "$OUTPUT" >> $GITHUB_OUTPUT
        echo "$EOF_MARKER" >> $GITHUB_OUTPUT

    - name: Comment Type Coverage on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        COVERAGE_STATUS: ${{ steps.type-coverage.outputs.status }}
        COVERAGE_PERCENT: ${{ steps.type-coverage.outputs.coverage }}
        COVERAGE_DETAILS: ${{ steps.type-coverage.outputs.details }}
        NODE_VER: ${{ matrix.node-version }}
      with:
        script: |
          const status = process.env.COVERAGE_STATUS;
          const coverage = process.env.COVERAGE_PERCENT;
          const details = process.env.COVERAGE_DETAILS;
          const nodeVersion = process.env.NODE_VER;

          const statusEmoji = status === 'success' ? '✅' : '❌';

          const body = [
            `## ${statusEmoji} Type Coverage Report (Node ${nodeVersion})`,
            '',
            `**Coverage: ${coverage}** (threshold: 90%)`,
            '',
            '<details>',
            '<summary>Details</summary>',
            '',
            '```',
            details,
            '```',
            '',
            '</details>'
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const marker = `Type Coverage Report (Node ${nodeVersion})`;
          const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
          }

    - name: Fail if Type Coverage Below Threshold
      if: steps.type-coverage.outputs.status == 'failure'
      run: exit 1

